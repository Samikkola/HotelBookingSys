services:
  api:
    build:
      context: .
      dockerfile: Docker.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    command: >
      dotnet watch run --project /src/HotelBookingSys.API/HotelBookingSys.API.csproj --no-launch-profile --urls http://0.0.0.0:8080
    volumes:
      - ./:/src
      - nuget-cache:/root/.nuget/packages

volumes:
  nuget-cache:
