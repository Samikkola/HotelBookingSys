# Required GitHub secret:
# - AZURE_WEBAPP_PUBLISH_PROFILE (from Azure Portal -> App Service -> Overview -> Download publish profile)
# - AZURE_SQL_CONNECTION_STRING (SQL connection string used by EF migration step)

name: Check Changes-> Build-> Test-> Deploy

on:
  # Run CI on pushes to main branches
  push:
    branches: [ "master", "main" ]
  # Also run CI validation for pull requests targeting main branches
  pull_request:
    branches: [ "master", "main" ]
  # Allow manual triggering of the workflow from GitHub UI
  workflow_dispatch:

jobs:
  # Detect if deploy-relevant files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy_needed: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deploy:
              - 'HotelBookingSys.API/**'
              - 'HotelBookingSys.Application/**'
              - 'HotelBookingSys.Infrastructure/**'
              - 'HotelBookingSys.Domain/**'
  # CI job: checks code quality by restoring, building, and testing
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Pull repository content to runner
    - name: Checkout repo
      uses: actions/checkout@v4
    
    # Install .NET SDK used by the solution
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    # Restore NuGet packages for the solution
    - name: Restore dependencies
      run: dotnet restore HotelBookingSys.slnx
      
    # Compile the solution in Release mode (without restore, since restore already ran)
    - name: Build solution
      run: dotnet build HotelBookingSys.slnx --no-restore --configuration Release
      
    # Execute tests in Release mode (without rebuilding)
    - name: Test
      run: dotnet test HotelBookingSys.slnx --no-build --configuration Release --verbosity normal

  # CD job: deploy after CI passes either
  # 1) automatically on push to master/main when deploy-relevant files changed, or
  # 2) manually via workflow_dispatch from master/main
  deploy:
    needs: [changes, build-and-test]
    if: |
      (
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
        needs.changes.outputs.deploy_needed == 'true'
      ) || (
        github.event_name == 'workflow_dispatch' &&
        (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest

    steps:
    # Pull repository content to runner
    - name: Checkout repo
      uses: actions/checkout@v4

    # Install .NET SDK for publish and migration commands
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Publish API project to local folder used as deployment package
    - name: Restore and publish
      run: dotnet publish HotelBookingSys.API/HotelBookingSys.API.csproj -c Release -o ./publish

    # Apply EF Core migrations against Azure SQL before app deployment
    # This step includes retry logic to handle cold start latency.
    - name: Run EF Core migrations
      shell: bash
      run: |
        dotnet tool install --global dotnet-ef --version 10.*
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

        success=false
        for i in {1..5}; do
          echo "Attempt $i to apply migrations..."

          if dotnet ef database update -p HotelBookingSys.Infrastructure -s HotelBookingSys.API; then
            success=true
            break
          fi

          echo "Migration failed, probably DB is waking up. Retrying in 15 seconds..."
          sleep 15
        done

        if [ "$success" != "true" ]; then
          echo "EF Core migration failed after 5 attempts."
          exit 1
        fi
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        Jwt__Secret: ${{ secrets.JWT_SECRET }}
        Jwt__Issuer: hotelbookingsys
        Jwt__Audience: hotelbookingsys

    # Deploy published output to Azure App Service
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: app-hotelbookingsys
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish